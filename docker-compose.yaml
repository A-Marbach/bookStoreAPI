services:
  api:
    image: ghcr.io/a-marbach/bookstore-api:latest
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/health || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - BookStoreDatabase__ConnectionString=mongodb://mongodb:27017/BookStore
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - mongodb_data:/data/db
    restart: on-failure

volumes:
  mongodb_data: