services:
  api:
    image: ghcr.io/a-marbach/bookstore-api:latest
    ports:
      - "8080:8080"
    environment:
      - BookStoreDatabase__ConnectionString=mongodb://mongodb:27017/BookStore
    depends_on:
      - mongodb
    restart: on-failure

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: on-failure

volumes:
  mongodb_data: