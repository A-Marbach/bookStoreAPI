name: Bookstore API Pipeline

on:
  push:
    branches: 
      - main
      - feature
  

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'


      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore




  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_token }} 

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/a-marbach/bookstore-api:latest
            ghcr.io/a-marbach/bookstore-api:${{ github.sha }}



  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST}}
          username: ${{ secrets.SSH_USER}}
          key: ${{ secrets.SSH_KEY  }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            echo "${{secrests.ghcr_token}}" | docker login ghcr.io -u a-marbach --password-stdin
            docker pull ghcr.io/a-marbach/bookstore-api:latest
            docker stop bookstore-api || true
            docker rm bookstore-api || true
            docker run -d -p 8080:8080 --restart unless-stopped --name bookstore-api ghcr.io/a-marbach/bookstore-api:latest
            docker image prune -f