name: Bookstore API Pipeline

on:
  push:
    branches: 
      - main
      - feature
  

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'


      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore




  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_token }} 

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/a-marbach/bookstore-api:latest
            ghcr.io/a-marbach/bookstore-api:${{ github.sha }}



  deploy:
      needs: docker
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup SSH key
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

        - name: Copy docker-compose to VM
          run: |
            scp -i ~/.ssh/id_rsa docker-compose.yaml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/bookstore-api/

        - name: Deploy via SSH
          uses: appleboy/ssh-action@v1.2.2
          with:
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USER }}
            key: ${{ secrets.SSH_KEY }}
            port: ${{ secrets.SSH_PORT }}
            script: |
              set -e
              cd ~/bookstore-api
              echo "${{ secrets.ghcr_token }}" | docker login ghcr.io -u a-marbach --password-stdin
              docker compose pull
              docker compose down
              docker compose up -d
              docker image prune -f
