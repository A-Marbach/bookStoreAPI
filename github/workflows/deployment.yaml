name: Bookstore API Pipeline

on:
  push:
    branches: 
      - main
      - feature
  

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'


      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore